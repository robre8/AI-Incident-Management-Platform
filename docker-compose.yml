services:

  # ── API ─────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5116:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=IncidentPlatformDB;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True"
      MongoSettings__ConnectionString: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017"
      MongoSettings__DatabaseName: "IncidentLogsDB"
      MongoSettings__LogsCollectionName: "Logs"
      # AWS credentials — set in .env file (never commit real values)
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AwsSettings__BucketName: "${AWS_S3_APP_BUCKET}"
      AwsSettings__Region: "${AWS_S3_APP_REGION}"
      ApiKey: "${API_KEY}"
    depends_on:
      sqlserver:
        condition: service_healthy
      mongodb:
        condition: service_started
    restart: on-failure

  # ── SQL Server ───────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "${SA_PASSWORD}"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -No -Q \"SELECT 1\" 2>/dev/null || exit 1"]
      interval: 15s
      retries: 10
      start_period: 30s
      timeout: 10s

  # ── MongoDB ──────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: "${MONGO_INITDB_ROOT_USERNAME}"
      MONGO_INITDB_ROOT_PASSWORD: "${MONGO_INITDB_ROOT_PASSWORD}"
    volumes:
      - mongodb_data:/data/db

volumes:
  sqlserver_data:
  mongodb_data:
